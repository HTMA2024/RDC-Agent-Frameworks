schema_version: "1"

required_fields:
  - field: schema_version
    type: string
    pattern: "^1$"
  - field: structural_verification
    type: object
    required_subfields: [status, causal_anchor_ref, probe_results, anomaly_cleared]
  - field: semantic_verification
    type: object
    required_subfields: [status, verification_mode, baseline_source_kind, baseline_source_ref, probe_summary]
  - field: overall_result
    type: object
    required_subfields: [status, derived_from]

status:
  structural_allowed: [passed, failed]
  semantic_allowed: [passed, failed, fallback_only]
  overall_allowed: [passed, failed]
